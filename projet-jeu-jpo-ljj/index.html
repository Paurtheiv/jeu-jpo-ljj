    // --- DEMARRAGE MANUEL POUR ACTIVER LE SON ---
    function startExperience() {
        document.getElementById('start-screen').style.display = 'none'; // Cache l'écran titre
        document.getElementById('game-ui').style.display = 'flex'; // Affiche le jeu
        goto('intro'); // Lance l'intro ET LE SON

    // --- FONCTION SON ---
    function playSceneAudio(sceneId) {
        let guide = userData.selectedGuide ? userData.selectedGuide.toLowerCase() : '';
        let path = "";

        // 1. SCENES DE JEAN JAURES
        if (sceneId === 'intro') path = 'assets/voix/jean jaures/jean_presente.mp3';
        else if (sceneId === 'selection_perso') path = 'assets/voix/jean jaures/jean_guide.mp3';
        else if (sceneId === 'intro_hack') path = 'assets/voix/jean jaures/jean_pth.mp3';
        else if (sceneId === 'demande_save') path = 'assets/voix/jean jaures/jean_bdd.mp3'; 
        else if (sceneId === 'final_message') path = 'assets/voix/jean jaures/jean_360.mp3';

        // 2. SCENES DES GUIDES
        else if (sceneId === 'accueil') path = `voix/${guide}/${guide}_hi.mp3`;
        else if (sceneId === 'question_statut') path = `voix/${guide}/${guide}_enc.mp3`;
        else if (sceneId === 'transition_couloir') path = `voix/${guide}/${guide}_fin_qcm.mp3`;
        else if (sceneId === 'couloir') path = `voix/${guide}/${guide}_couloir.mp3`;
        else if (sceneId === 'porte' && guide !== 'davina') path = `voix/${guide}/${guide}_porte.mp3`; 
        else if (sceneId === 'salle') path = `voix/${guide}/${guide}_salle.mp3`;

        // 3. PROJETS
        else if (sceneId.startsWith('projet_') && !sceneId.includes('video')) {
            let num = sceneId.split('_')[1]; 
            path = `voix/${guide}/projets/${guide}_p${num}.mp3`;
        }
        else if (sceneId === 'projet_video_demo') path = `voix/${guide}/projets/${guide}_vp.mp3`;

        // 4. QUESTIONS
        else if (sceneId.startsWith('q_col_')) {
            let num = sceneId.split('_')[2];
            path = `voix/${guide}/questions_collégien/${guide}_q${num}.mp3`;
        }
        else if (sceneId.startsWith('q_lyc_')) {
            let num = sceneId.split('_')[2];
            path = `voix/${guide}/questions_lyccéen/${guide}_q${num}.mp3`; // Correction "lyccéen"
        }
        else if (sceneId.startsWith('q_etu_')) {
            let num = sceneId.split('_')[2];
            path = `voix/${guide}/questions_etudiant/${guide}_q${num}.mp3`;
        }

        if(path) {
            if(currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            currentAudio = new Audio(path);
            currentAudio.play().catch(e => console.log("Erreur audio : " + e));
        }
    }

    const CHARS = {

        'q_lyc_1': { useGuide: true, bgType: 'accueil', text: "Q1/5 : Ta spécialité préférée ?", choices: [{txt:"Maths / NSI / STI2D",val:30,next:'q_lyc_2'}, {txt:"Littérature / Histoire / SES",val:0,next:'q_lyc_2'}] },

        'q_etu_2': { useGuide: true, bgType: 'accueil', text: "Q2/5 : Tu es plus Hardware ou Software ?", choices: [{txt:"Hardware (Matériel / Réseaux)",val:20,next:'q_etu_3'}, {txt:"Software (Développement)",val:20,next:'q_etu_3'}] },

            action: function() { setTimeout(() => { goto('couloir'); }, 7500); }

    // --- FONCTIONS ---
    function showCharacterSelection() {
        let ui = document.getElementById('choices-area');
        ui.innerHTML = ''; ui.className = 'char-select-grid active'; 
        const guides = [{ id: 'DAVINA' }, { id: 'UGO' }, { id: 'DEMA' }];
        guides.forEach(g => {
            let btn = document.createElement('div'); btn.className = 'char-card'; btn.innerText = g.id;
            btn.onclick = () => { userData.selectedGuide = g.id; goto('accueil'); };
            ui.appendChild(btn);
        });
    }

    function routerQuiz(niveau) { goto(`q_${niveau.toLowerCase()}_1`); }

    function goto(id) {
        if(id === 'reload') location.reload();
        
        // EXCEPTION DAVINA (Pas de porte)
        if (id === 'porte' && userData.selectedGuide === 'DAVINA') { goto('salle'); return; }

        let sc = scenes[id];
        let guide = userData.selectedGuide; 
        let charName = '', charImg = '', bgImage = sc.bg;

        if (sc.useGuide) {
            charName = guide; 
            if (sc.bgType) bgImage = `${guide.toLowerCase()}_${sc.bgType}.jpg`;
        } else {
            if (sc.char) { charName = CHARS[sc.char].name; charImg = CHARS[sc.char].img; }
        }

        let configChar = CHARS[sc.useGuide ? guide : sc.char] || CHARS['JJ'];
        let bgDiv = document.getElementById('background');
        if (bgImage && !bgImage.includes('?')) bgImage += '?v=9';
        bgDiv.style.backgroundImage = `url('${bgImage}')`;
        
        if (sc.forceContain) bgDiv.classList.add('force-contain');
        else bgDiv.classList.remove('force-contain');
        
        let container = document.getElementById('char-container');
        let img = document.getElementById('char-img');
        let uiLayer = document.getElementById('ui-layer');
        let dialogueBox = document.getElementById('dialogue-box');

        container.className = ''; uiLayer.className = ''; dialogueBox.className = '';

        if (sc.useGuide) dialogueBox.classList.add(`style-${guide}`);
        else if (sc.char) dialogueBox.classList.add(`style-${sc.char}`);

        if (sc.adjustJJ) { container.classList.add('jj-selection'); uiLayer.classList.add('ui-lifted'); }
        if (guide === 'DEMA' && !sc.hideChar) container.classList.add('dema-pos');

        if(charImg && !sc.hideChar) { 
            if (img.src.indexOf(charImg) === -1) {
                img.style.opacity = '0';
                setTimeout(() => { img.src = charImg; img.style.display = 'block'; img.style.opacity = '1'; }, 200); 
            } else { img.style.display = 'block'; img.style.opacity = '1'; }
        } else { 
            img.style.opacity = '0'; setTimeout(() => { img.style.display = 'none'; }, 300);
        }

        document.getElementById('speaker-name').innerText = (sc.useGuide ? guide : configChar.name);
        let color = '#00e5ff'; 
        let activeName = sc.useGuide ? guide : sc.char;
        if(activeName === 'DAVINA') color = 'var(--davina-color)';
        else if(activeName === 'UGO') color = 'var(--ugo-color)';
        else if(activeName === 'DEMA') color = 'var(--dema-color)';
        else if(activeName === 'JJ') color = '#ffffff';
        document.getElementById('speaker-name').style.background = color;
        
        let txtContent = (typeof sc.text === 'function') ? sc.text(userData.prenom) : sc.text;
        typeWriter(txtContent);

        // --- LECTURE AUDIO ---
        playSceneAudio(id);

        let ui = document.getElementById('choices-area');
        ui.innerHTML = ''; ui.className = ''; ui.classList.remove('active');

        if(sc.customChoices) { setTimeout(showCharacterSelection, 400); return; }
        if(sc.action && !sc.choices && !sc.input) { sc.action(); return; }

        setTimeout(() => {
            if(sc.input) {
                ui.innerHTML = `<div class="input-group"><input type="text" id="user-input" placeholder="Ton prénom..."><button class="valid-btn" onclick="validateInput('${sc.next}')">OK</button></div>`;
            } else if (sc.choices) {
                sc.choices.forEach(c => {
                    let btn = document.createElement('div');
                    btn.className = 'btn-choice';
                    btn.innerHTML = `${c.txt} <span>${c.sub || ''}</span>`;
                    btn.onclick = () => {
                        if(c.action) { c.action(); return; }
                        if(c.save) userData[c.save] = c.txt;
                        if(c.val) userData.score += c.val;
                        goto(c.next);
                    };
                    ui.appendChild(btn);
                });
            }
            if(ui.innerHTML !== '') ui.classList.add('active');
        }, 400);
    }

    function playVideo(videoFile, nextSceneId) {
        if(currentAudio) { currentAudio.pause(); } 
        let layer = document.getElementById('video-layer');
        let vid = document.getElementById('main-player');
        let skip = document.getElementById('skip-btn');
        currentVideoCallback = nextSceneId;
        vid.src = videoFile; layer.style.display = 'flex'; skip.style.display = 'block';
        vid.play().catch(e => console.log("Clic requis"));
        vid.onended = stopVideo;
    }

    function stopVideo() {
        let layer = document.getElementById('video-layer');
        let vid = document.getElementById('main-player');
        vid.pause(); layer.style.display = 'none';
        if(currentVideoCallback) goto(currentVideoCallback);
    }

    function validateInput(next) {
        let val = document.getElementById('user-input').value.trim();
        if(val) { userData.prenom = val.charAt(0).toUpperCase() + val.slice(1).toLowerCase(); goto(next); }
    }
    
    function quitApp360() { window.location.href = "https://my.web-visite.com/F1ltEQAj8H/12357121p&288.44h&90.09t"; }

    function typeWriter(txt) {
        if (typeWriterTimeout) clearTimeout(typeWriterTimeout);
        let el = document.getElementById('text-content'); 
        el.innerHTML = ""; 
        let i = 0;
        function t() { 
            if(i < txt.length) { 
                el.innerHTML += txt.charAt(i); 
                i++; 
                typeWriterTimeout = setTimeout(t, 20); 
            } else { typeWriterTimeout = null; }
        } 
        t();
    }
    
    // ENVOI DONNEES NETLIFY
    function sendData() {
        const formData = new FormData();
        formData.append("form-name", "visite-jpo");
        formData.append("prenom", userData.prenom);
        formData.append("guide_choisi", userData.selectedGuide);
        formData.append("statut", userData.statut);

        fetch("/", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams(formData).toString(),
        })
        .then(() => {
            alert("✅ Visite bien enregistrée !");
        })
        .catch((error) => alert("Erreur d'envoi : " + error));
    }

    // Le script ne se lance pas seul, il attend le clic sur "COMMENCER"
</script>
</body>
</html>
